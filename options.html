<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>GLM 抢购助手 - 设置</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      padding: 20px;
      max-width: 500px;
      margin: 0 auto;
      background: #f5f5f5;
    }
    h3 {
      margin: 0 0 20px 0;
      color: #333;
    }
    .setting-row {
      margin: 16px 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    label {
      font-size: 14px;
      color: #555;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    input[type="number"] {
      padding: 6px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      width: 80px;
      font-size: 14px;
    }
    button {
      background: #1890ff;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      margin-top: 20px;
    }
    button:hover {
      background: #40a9ff;
    }
    .hint {
      font-size: 12px;
      color: #999;
      margin-left: 24px;
    }
  </style>
</head>
<body>
  <h3>GLM Coding Pro 设置</h3>

  <div class="setting-row">
    <label>
      <input type="checkbox" id="enableAuto">
      启用自动触发
    </label>
  </div>

  <div class="setting-row">
    <label>抢购套餐:</label>
    <select id="packageType">
      <option value="lite">Lite - 轻量版</option>
      <option value="pro" selected>Pro - 专业版（推荐）</option>
      <option value="max">Max - 旗舰版</option>
    </select>
  </div>

  <div class="setting-row">
    <label>
      提前触发时间（分钟）:
      <input type="number" id="offsetMin" min="0" max="180" step="1" value="0">
    </label>
  </div>
  <div class="hint">设置提前多少分钟开始尝试抢购（0表示正好10:00开始）</div>

  <div class="setting-row">
    <label>
      <input type="checkbox" id="notify">
      启用桌面通知
    </label>
  </div>

  <button id="saveBtn">保存设置</button>

  <script src="options.js"></script>
</body>
</html>
